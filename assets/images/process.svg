<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <style>
    .line { stroke: #2aa198; stroke-width: 4; }
    .circle { fill: white; stroke: #2aa198; stroke-width: 4; }
    .text { font-family: Arial, sans-serif; font-size: 20px; fill: #555; text-anchor: middle; }
  </style>

  <!-- Lijn -->
  <line x1="100" y1="80" x2="700" y2="80" class="line"></line>

  <!-- Cirkels -->
  <circle cx="200" cy="80" r="12" class="circle"></circle>
  <circle cx="400" cy="80" r="16" class="circle"></circle>
  <circle cx="600" cy="80" r="12" class="circle"></circle>

  <!-- Labels -->
  <text x="200" y="140" class="text">Understand</text>
  <text x="400" y="140" class="text">Explore</text>
  <text x="600" y="140" class="text">Validate</text>
</svg>