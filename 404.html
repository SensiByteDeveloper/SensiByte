<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Page not found · SensiByte</title>
    <link rel="icon" href="assets/images/sensibyte-logo.png" type="image/png" id="favicon-404" />
    <script>
      (function () {
        try {
          var t = localStorage.getItem("sensibyte-theme");
          if (t !== "light" && t !== "dark") {
            t = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          }
          document.documentElement.setAttribute("data-theme", t);
          var fl = document.getElementById("favicon-404");
          if (fl) {
            fl.setAttribute("href", t === "dark" ? "assets/images/sensibyte-logo-dark.png" : "assets/images/sensibyte-logo.png");
          }
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body>
    <main class="wrap" style="padding: 4rem 0; text-align: center">
      <p class="section-kicker" style="margin-bottom: 0.5rem">404</p>
      <h1 style="margin: 0 0 1rem; letter-spacing: -0.02em">Page not found</h1>
      <p style="color: var(--text-muted); margin: 0 0 1.5rem">
        The page you are looking for does not exist or was moved.
      </p>
      <a class="btn btn-primary" href="index.html">Back to home</a>
    </main>
  </body>
</html>
